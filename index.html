<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pace-js@latest/pace-theme-default.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tranzit</title>
  <script src="https://cdn.jsdelivr.net/npm/pace-js@latest/pace.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.paceOptions = {
      // Stop pace from restarting on tiny, fast background requests
      restartOnRequestAfter: false,

      // Ignore long-lived connections like WebSockets or SSE
      trackWebSockets: false,

      // Prevent it from hanging forever if something stalls
      ajax: {
        trackMethods: ['GET', 'POST', 'PUT', 'DELETE'],
        // Ignore background analytics tracking if you use it
        ignoreURLs: ['analytics', 'mixpanel', 'hotjar', 'browserLink']
      }
    };
  </script>
</body>

</html>
